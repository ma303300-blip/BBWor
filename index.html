<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BBWor</title>
  <meta name="theme-color" content="#0e0d0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.55);
      --dark: #0e0d0c;
      --card-bg: rgba(14,13,12,0.95);
      --text: #fff;
      --text-dim: rgba(255,255,255,0.45);
    }
    body {
      min-height: 100vh; min-height: 100dvh;
      font-family: 'Heebo', sans-serif;
      background: #252320 url('bg.png') center top / cover fixed;
      color: var(--text);
    }
    .screen { display: none; min-height: 100vh; min-height: 100dvh; }
    .screen.active { display: flex; }

    /* HOME */
    #screen-home { align-items: center; justify-content: center; padding: 0 16px 80px; height: 100vh; height: 100dvh; min-height: 0; overflow: hidden; }
    .bsd-corner { position: fixed; top: 14px; right: 18px; color: rgba(255,255,255,0.4); font-size: 13px; letter-spacing: 1px; z-index: 50; pointer-events: none; }
    @keyframes border-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .home-card-wrap { position: relative; width: 100%; max-width: 360px; border-radius: 23px; padding: 2px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    .home-card-wrap::before { content: ''; position: absolute; inset: -100%; background: conic-gradient(from 0deg, transparent 0%, #c9a84c 18%, #f5d88a 23%, #c9a84c 28%, transparent 46%); animation: border-spin 2.5s linear infinite; }
    .home-card { position: relative; width: 100%; background: rgba(14,13,12,0.85); border-radius: 21px; padding: 30px 22px 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; z-index: 1; }
    .sparkle-top { color: var(--gold); font-size: 22px; opacity: 0.8; }
    .manager-btn { width: 100%; background: transparent; border: 1px solid rgba(201,168,76,0.22); border-radius: 14px; padding: 16px 12px 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
    .manager-btn:active { background: rgba(201,168,76,0.09); border-color: rgba(201,168,76,0.5); }
    .manager-icon { font-size: 18px; color: var(--gold); margin-bottom: 2px; }
    .manager-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 36px; font-weight: 900; color: var(--gold); letter-spacing: 2px; line-height: 1; text-shadow: 0 4px 14px rgba(201,168,76,0.7), 0 8px 28px rgba(201,168,76,0.4), 0 2px 5px rgba(201,168,76,0.55); }
    .manager-title-accent { color: #e03535; text-shadow: 0 4px 14px rgba(224,53,53,0.85), 0 8px 28px rgba(224,53,53,0.5), 0 2px 5px rgba(224,53,53,0.65); }
    .manager-sub { font-size: 11px; color: var(--gold-dim); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }
    .manager-name { font-size: 15px; color: #e03535; font-weight: 800; letter-spacing: 1.5px; margin-top: 4px; text-shadow: 0 2px 10px rgba(224,53,53,0.6); }
    .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.6), transparent); }
    .choose-label { color: var(--text-dim); font-size: 14px; }
    .branches { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .branch-btn { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09); border-radius: 16px; padding: 26px 10px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all 0.18s ease; -webkit-tap-highlight-color: transparent; }
    .branch-btn:active { background: rgba(201,168,76,0.07); border-color: rgba(201,168,76,0.35); transform: scale(0.97); }
    .b-icon { font-size: 26px; color: var(--gold); }
    .b-title { font-size: 15px; font-weight: 700; color: #fff; text-align: center; }
    .b-sub { font-size: 12px; color: var(--text-dim); }

    /* REGISTER */
    #screen-register { flex-direction: column; align-items: center; justify-content: flex-start; padding: 24px 16px 32px; overflow-y: auto; }
    .reg-card { width: 100%; max-width: 360px; background: var(--card-bg); border: 1.5px solid var(--gold); border-radius: 22px; padding: 26px 22px 24px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    .reg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 2px; }
    .back-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 14px; font-family: inherit; transition: background 0.2s; flex-shrink: 0; }
    .back-btn:active { background: rgba(255,255,255,0.14); }
    .reg-title { font-size: 17px; font-weight: 700; color: var(--gold); }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--text-dim); }
    .form-group input { background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.13); border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-group input:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
    .form-group input::placeholder { color: rgba(255,255,255,0.25); }
    .photo-label { font-size: 12px; color: var(--text-dim); }
    .photo-preview-wrap { display: flex; justify-content: center; }
    #photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); display: none; }
    #photo-preview.show { display: block; }
    .photo-btns { display: flex; gap: 10px; }
    .photo-btn { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 8px; color: rgba(255,255,255,0.75); cursor: pointer; font-size: 13px; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .photo-btn:active { background: rgba(201,168,76,0.09); border-color: var(--gold-dim); }
    .photo-btn .p-icon { font-size: 22px; }
    .submit-btn { width: 100%; background: var(--gold); border: none; border-radius: 12px; padding: 15px; color: #111; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 6px; transition: opacity 0.15s, transform 0.15s; }
    .submit-btn:active { transform: scale(0.98); opacity: 0.88; }

    /* EMPLOYEE */
    #screen-employee { flex-direction: column; }
    .emp-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; padding-top: calc(14px + env(safe-area-inset-top, 0px)); background: transparent; border-bottom: none; position: sticky; top: 0; z-index: 10; }
    .bsd-text { font-size: 14px; color: rgba(255,255,255,0.45); letter-spacing: 1px; }
    .exit-btn { background: rgba(14,13,12,0.4); border: 1px solid rgba(255,255,255,0.13); border-radius: 8px; padding: 7px 14px; color: rgba(255,255,255,0.7); font-size: 13px; font-family: inherit; cursor: pointer; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
    .exit-btn:active { background: rgba(255,255,255,0.14); }
    .emp-body { flex: 1; padding: 22px 16px 32px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
    .emp-greeting { text-align: center; padding: 4px 0 8px; }
    .emp-greeting .emp-name-txt { font-size: 21px; font-weight: 700; color: var(--gold); }
    .emp-greeting .emp-branch-txt { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .action-btn { background: rgba(14,13,12,0.4); border: 1px solid rgba(201,168,76,0.25); border-radius: 16px; padding: 26px 12px 22px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all 0.18s ease; -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 20px rgba(0,0,0,0.45); }
    .action-btn:active { background: rgba(201,168,76,0.07); border-color: rgba(201,168,76,0.55); transform: scale(0.97); }
    .action-btn .a-icon { font-size: 28px; }
    .action-btn .a-label { font-size: 14px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; }
    .action-btn.empty { opacity: 0.3; pointer-events: none; }
    .logo-gap { height: 104px; }
    .work-banner { background: rgba(14,13,12,0.4); border: 1px solid rgba(201,168,76,0.25); border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 20px rgba(0,0,0,0.45); cursor: pointer; transition: all 0.18s ease; -webkit-tap-highlight-color: transparent; }
    .work-banner:active { background: rgba(201,168,76,0.07); border-color: rgba(201,168,76,0.55); }
    .banner-icon { font-size: 20px; color: var(--gold); }
    .banner-label { font-size: 18px; font-weight: 700; color: #fff; }

    /* MANAGER */
    #screen-manager { flex-direction: column; }
    .mgr-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(10,9,8,0.92); border-bottom: 1px solid rgba(201,168,76,0.3); position: sticky; top: 0; z-index: 10; }
    .mgr-title-txt { font-size: 18px; font-weight: 700; color: var(--gold); }
    .mgr-body { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
    .branch-section { display: flex; flex-direction: column; gap: 10px; }
    .branch-section-head { font-size: 15px; font-weight: 700; color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid rgba(201,168,76,0.25); }
    .sub-label { font-size: 12px; color: var(--text-dim); margin: 4px 0 2px; }
    .emp-card { background: rgba(14,13,12,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .emp-card.pending { border-color: rgba(201,168,76,0.25); }
    .emp-card.approved { border-color: rgba(80,200,100,0.18); }
    .emp-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(201,168,76,0.35); background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--gold); flex-shrink: 0; overflow: hidden; }
    .emp-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .emp-info { flex: 1; min-width: 0; }
    .emp-fullname { font-size: 15px; font-weight: 700; color: #fff; }
    .emp-phone-txt { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    .emp-actions { display: flex; gap: 7px; }
    .btn-approve, .btn-reject { border: none; border-radius: 8px; padding: 8px 13px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; }
    .btn-approve { background: rgba(70,185,80,0.85); color: #fff; }
    .btn-reject  { background: rgba(200,55,55,0.75); color: #fff; }
    .badge-active { font-size: 11px; color: rgba(80,200,100,0.85); background: rgba(80,200,100,0.1); border-radius: 6px; padding: 4px 9px; }
    .empty-msg { font-size: 13px; color: var(--text-dim); padding: 10px 0; text-align: center; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #1b1915; border: 1.5px solid var(--gold); border-radius: 22px; padding: 32px 24px 26px; width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    .modal-big-icon { font-size: 48px; line-height: 1; }
    .modal-heading { font-size: 20px; font-weight: 700; color: var(--gold); line-height: 1.3; }
    .modal-body-text { font-size: 14px; color: var(--text-dim); line-height: 1.75; white-space: pre-line; }
    .modal-ok-btn { width: 100%; background: var(--gold); border: none; border-radius: 11px; padding: 14px; color: #111; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 6px; }

    /* INSTALL BANNER */
    #install-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 999; background: #1a1815; border-top: 1.5px solid var(--gold); padding: 14px 16px 28px; box-shadow: 0 -8px 32px rgba(0,0,0,0.7); transform: translateY(100%); transition: transform 0.35s ease; }
    #install-banner.show { display: block; }
    #install-banner.animate { transform: translateY(0); }
    .install-inner { display: flex; align-items: center; gap: 14px; max-width: 480px; margin: 0 auto; }
    .install-logo { width: 54px; height: 54px; border-radius: 14px; object-fit: cover; border: 1.5px solid var(--gold); flex-shrink: 0; }
    .install-texts { flex: 1; }
    .install-title { font-size: 15px; font-weight: 700; color: #fff; }
    .install-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .install-actions { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; flex-shrink: 0; }
    .install-btn { background: var(--gold); border: none; border-radius: 9px; padding: 9px 16px; color: #111; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .install-dismiss { background: transparent; border: none; color: var(--text-dim); font-size: 12px; font-family: inherit; cursor: pointer; text-decoration: underline; }

    /* iOS INLINE STEPS */
    .ios-steps-inline { overflow: hidden; max-height: 0; transition: max-height 0.3s ease, padding-top 0.3s ease, border-top-width 0.3s ease; padding-top: 0; border-top: 0px solid rgba(201,168,76,0.25); max-width: 480px; margin: 0 auto; }
    .ios-steps-inline.open { max-height: 140px; padding-top: 12px; border-top-width: 1px; }
    .ios-step-row { font-size: 13px; color: rgba(255,255,255,0.82); display: flex; align-items: flex-start; gap: 9px; margin-bottom: 9px; line-height: 1.45; }
    .ios-step-row:last-child { margin-bottom: 0; }
    .ios-step-row b { color: #fff; }
    .ios-num-sm { background: var(--gold); color: #111; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

    /* MANAGER EDIT */
    .action-btn, .work-banner { position: relative; }
    .mgr-edit-btn { position: absolute; top: 7px; left: 8px; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; color: var(--gold); font-size: 12px; padding: 2px 6px; cursor: pointer; z-index: 2; -webkit-tap-highlight-color: transparent; line-height: 1.5; }
    .edit-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(201,168,76,0.4); border-radius: 10px; padding: 11px 13px; color: #fff; font-size: 15px; font-family: inherit; outline: none; width: 100%; box-sizing: border-box; }
    .edit-field:focus { border-color: var(--gold); }
    .edit-row-btns { display: flex; gap: 8px; width: 100%; }
    .edit-save-btn { flex: 1; background: var(--gold); border: none; border-radius: 10px; padding: 13px; color: #111; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
    .edit-cancel-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 13px 16px; color: rgba(255,255,255,0.6); font-size: 14px; font-family: inherit; cursor: pointer; }

    /* GREETING OVERLAY */
    #greet-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 400; background: rgba(14,13,12,0.93); pointer-events: none; }
    #greet-overlay.active { display: flex; }
    #greet-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 44px; font-weight: 900; color: var(--gold); text-align: center; text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.4); opacity: 0; }
    #greet-text.run { animation: greet-zoom-fade 1.8s ease-out forwards; }
    @keyframes greet-zoom-fade {
      0%   { opacity: 0;   transform: scale(0.15); }
      28%  { opacity: 1;   transform: scale(1.05); }
      58%  { opacity: 1;   transform: scale(1.12); }
      100% { opacity: 0;   transform: scale(1.5);  }
    }

    /* SYNC PILL */
    #sync-bar { position: fixed; bottom: calc(10px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); padding: 5px 12px; background: rgba(14,13,12,0.38); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; z-index: 55; white-space: nowrap; }
    #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #f0a500; flex-shrink: 0; }
    #sync-dot.synced { background: #2ecc71; }
    #sync-dot.error  { background: #e03535; }
    #sync-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.4px; }

    /* FAB MAIL */
    .fab-mail { position: fixed; bottom: calc(44px + env(safe-area-inset-bottom, 0px)); right: 20px; width: 58px; height: 58px; background: var(--card-bg); border: 1.5px solid var(--gold); border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 28px rgba(0,0,0,0.65); z-index: 60; -webkit-tap-highlight-color: transparent; font-size: 26px; transition: transform 0.15s; }
    .fab-mail.visible { display: flex; }
    .fab-mail:active { transform: scale(0.92); }
    .fab-badge { position: absolute; top: -3px; right: -3px; background: #e03535; color: #fff; font-size: 11px; font-weight: 700; min-width: 19px; height: 19px; border-radius: 10px; display: none; align-items: center; justify-content: center; padding: 0 5px; border: 2px solid #0e0d0c; }
    .fab-badge.show { display: flex; }

    /* PENDING DRAWER */
    .pending-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; }
    .pending-overlay.open { display: block; }
    .pending-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #1b1915; border-top: 1.5px solid var(--gold); border-radius: 22px 22px 0 0; z-index: 101; transform: translateY(100%); transition: transform 0.32s ease; max-height: 78vh; display: flex; flex-direction: column; }
    .pending-drawer.open { transform: translateY(0); }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px 14px; border-bottom: 1px solid rgba(201,168,76,0.2); flex-shrink: 0; }
    .drawer-title { font-size: 16px; font-weight: 700; color: var(--gold); }
    .drawer-close-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); border-radius: 8px; padding: 7px 14px; color: rgba(255,255,255,0.7); font-size: 13px; font-family: inherit; cursor: pointer; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 10px; }
    .drawer-empty { text-align: center; color: var(--text-dim); font-size: 14px; padding: 30px 0; }
    .req-card { background: rgba(14,13,12,0.9); border: 1px solid rgba(201,168,76,0.22); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .req-branch-tag { font-size: 10px; color: var(--gold); background: rgba(201,168,76,0.1); border-radius: 5px; padding: 2px 7px; margin-top: 3px; display: inline-block; }
  </style>
</head>
<body>

  <div class="bsd-corner">בס"ד</div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-card-wrap">
    <div class="home-card">
      <div class="sparkle-top">✦</div>
      <button class="manager-btn" onclick="enterManager()">
        <span class="manager-icon">✦</span>
        <span class="manager-title">BBW<span class="manager-title-accent">oa</span></span>
        <span class="manager-sub">MANAGER ACCESS</span>
        <span class="manager-name">אוריה עמר</span>
      </button>
      <div class="divider"></div>
      <div class="choose-label">בחרו סניף להמשיך</div>
      <div class="branches">
        <button class="branch-btn" onclick="enterBranch('raanana')">
          <span class="b-icon">✦</span>
          <span class="b-title">סניף רעננה</span>
          <span class="b-sub">כניסה / הרשמה</span>
        </button>
        <button class="branch-btn" onclick="enterBranch('hadera')">
          <span class="b-icon">✦</span>
          <span class="b-title">סניף חדרה</span>
          <span class="b-sub">כניסה / הרשמה</span>
        </button>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="screen-register" class="screen">
    <div class="reg-card">
      <div class="reg-header">
        <button class="back-btn" onclick="goHome()">→ חזרה</button>
        <div class="reg-title" id="reg-title">הרשמה לסניף</div>
      </div>
      <div class="form-group">
        <label>שם פרטי</label>

  <!-- INSTALL BANNER -->
  <div id="install-banner">
    <div class="install-inner">
      <img class="install-logo" src="icon-192x192.png" alt="BBWor">
      <div class="install-texts">
        <div class="install-title">BBWor</div>
        <div class="install-sub" id="install-sub-txt">התקן את האפליקציה על המסך הבית שלך</div>
      </div>
      <div class="install-actions">
        <button class="install-btn" id="btn-install">התקן ✦</button>
        <button class="install-dismiss" id="btn-dismiss">לא עכשיו</button>
      </div>
    </div>
    <div class="ios-steps-inline" id="ios-steps-inline">
      <div class="ios-step-row"><span class="ios-num-sm">1</span><span>לחץ <b>⬆️ שיתוף</b> בסרגל התחתון של Safari</span></div>
      <div class="ios-step-row"><span class="ios-num-sm">2</span><span>בחר <b>"הוסף למסך הבית"</b></span></div>
      <div class="ios-step-row"><span class="ios-num-sm">3</span><span>לחץ <b>"הוסף"</b> בפינה הימנית — וזהו! 🎉</span></div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════
       SERVICE WORKER
    ═══════════════════════════════════ */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(r => r.update()).catch(() => {});
    }

    /* ═══════════════════════════════════
       INSTALL BANNER
    ═══════════════════════════════════ */
    var _prompt = null;
    var _isIOS  = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var _isSA   = window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _prompt = e;
      setTimeout(showBanner, 2500);
    });

    function showBanner() {
      if (_isSA) return;
      if (localStorage.getItem('bbwor_nodisplay')) return;
      if (_isIOS) {
        document.getElementById('btn-install').textContent = 'כיצד? 📲';
        document.getElementById('install-sub-txt').textContent = 'הוסף לאייפון שלך ממסך Safari';
      }
      var b = document.getElementById('install-banner');
      b.classList.add('show');
      requestAnimationFrame(function() {
        requestAnimationFrame(function() { b.classList.add('animate'); });
      });
    }

    function hideBanner() {
      var b = document.getElementById('install-banner');
      b.classList.remove('animate');
      document.getElementById('ios-steps-inline').classList.remove('open');
      setTimeout(function() { b.classList.remove('show'); }, 350);
    }

    document.getElementById('btn-install').addEventListener('click', function() {
      if (_isIOS) {
        var steps = document.getElementById('ios-steps-inline');
        var isOpen = steps.classList.toggle('open');
        document.getElementById('btn-install').textContent = isOpen ? 'סגור ✕' : 'כיצד? 📲';
      } else if (_prompt) {
        _prompt.prompt();
        _prompt.userChoice.then(function() { _prompt = null; hideBanner(); });
      }
    });

    document.getElementById('btn-dismiss').addEventListener('click', function() {
      hideBanner();
      localStorage.setItem('bbwor_nodisplay', '1');
    });

    if (_isIOS && !_isSA) {
      window.addEventListener('load', function() { setTimeout(showBanner, 2500); });
    }

    /* ═══════════════════════════════════
       FIREBASE INIT
    ═══════════════════════════════════ */
    firebase.initializeApp({
      apiKey: "AIzaSyCzvPWJ6j9u1yLjjDCUOpPNftzP1JKRKq4",
      authDomain: "bbwoa-b498b.firebaseapp.com",
      projectId: "bbwoa-b498b",
      storageBucket: "bbwoa-b498b.firebasestorage.app",
      messagingSenderId: "301236038690",
      appId: "1:301236038690:web:db96665d9543424e752e7b"
    });
    var db = firebase.firestore();

    /* ═══════════════════════════════════
       APP STATE
    ═══════════════════════════════════ */
    var BRANCH_NAME = { raanana: 'סניף רעננה', hadera: 'סניף חדרה' };
    var BTNS = ['btn1', 'btn2', 'btn3', 'btn4'];
    var activeBranch = null;
    var pendingPhoto  = null;
    var modalCallback = null;
    var _editKey = null;
    var _badgeUnsub = null;

    var DEFAULT_CONTENT = {
      btn1:   { icon: '✅', label: 'צ\'ק ליסט' },
      btn2:   { icon: '🎯', label: 'יעד חודשי' },
      btn3:   { icon: '🏆', label: 'תחרות בין העובדים' },
      btn4:   { icon: '📌', label: 'אילוצים' },
      banner: { icon: '📅', label: 'סידור עבודה' }
    };

    function getSession(branch) { return JSON.parse(localStorage.getItem('bbwor_session_' + branch) || 'null'); }
    function setSession(branch, s) { localStorage.setItem('bbwor_session_' + branch, JSON.stringify(s)); }
    function clearSession(branch) { localStorage.removeItem('bbwor_session_' + branch); }
    function getContent() { return JSON.parse(localStorage.getItem('bbwor_content') || JSON.stringify(DEFAULT_CONTENT)); }
    function setContent(c) { localStorage.setItem('bbwor_content', JSON.stringify(c)); }

    function show(name) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById('screen-' + name).classList.add('active');
      if (name !== 'manager') document.getElementById('fab-mail').classList.remove('visible');
      document.querySelector('.bsd-corner').style.display = (name === 'employee' || name === 'manager') ? 'none' : '';
      window.scrollTo(0, 0);
      localStorage.setItem('bbwor_screen', name);
    }

    document.getElementById('screen-home').addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    function goHome() { activeBranch = null; pendingPhoto = null; show('home'); }

    function setSyncStatus(s) {
      var dot = document.getElementById('sync-dot');
      var lbl = document.getElementById('sync-label');
      if (!dot) return;
      dot.className = s;
      lbl.textContent = s === 'synced' ? 'מסונכרן ✓' : s === 'error' ? 'שגיאת סינכרון' : 'מתחבר...';
    }

    /* global sync monitor */
    db.collection('employees').limit(1)
      .onSnapshot({ includeMetadataChanges: true },
        function(snap) { setSyncStatus(snap.metadata.fromCache ? 'connecting' : 'synced'); },
        function()     { setSyncStatus('error'); }
      );
    window.addEventListener('offline', function() { setSyncStatus('error'); });
    window.addEventListener('online',  function() { setSyncStatus('connecting'); });

    function enterManager() {
      renderManagerGrid();
      document.getElementById('fab-mail').classList.add('visible');
      if (!_badgeUnsub) {
        _badgeUnsub = db.collection('employees').where('status', '==', 'pending')
          .onSnapshot(function(snap) {
            var count = snap.size;
            var badge = document.getElementById('fab-badge');
            badge.textContent = count;
            badge.classList.toggle('show', count > 0);
          });
      }
      showGreeting('אוריה', function() { show('manager'); });
    }

    function enterBranch(branch) {
      activeBranch = branch;
      var session = getSession(branch);
      if (!session) { openRegisterForm(branch); return; }
      db.collection('employees').doc(session.empId).get()
        .then(function(doc) {
          if (!doc.exists) { clearSession(branch); openRegisterForm(branch); return; }
          var emp = doc.data();
          if (emp.status === 'approved') { openEmployeeHome(emp); }
          else { showPendingModal(emp.firstName + ' ' + emp.lastName); }
        })
        .catch(function() { openRegisterForm(branch); });
    }

    function openRegisterForm(branch) {
      document.getElementById('reg-title').textContent = 'הרשמה ל' + BRANCH_NAME[branch];
      document.getElementById('reg-first').value = '';
      document.getElementById('reg-last').value  = '';
      document.getElementById('reg-phone').value = '';
      document.getElementById('photo-preview').src = '';
      document.getElementById('photo-preview').classList.remove('show');
      document.getElementById('preview-wrap').style.display = 'none';
      pendingPhoto = null;
      show('register');
    }

    function loadPhoto(input) {
      var file = input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var rawImg = new Image();
        rawImg.onload = function() {
          var canvas = document.createElement('canvas');
          var max = 300, w = rawImg.width, h = rawImg.height;
          if (w > h) { if (w > max) { h = Math.round(h * max / w); w = max; } }
          else       { if (h > max) { w = Math.round(w * max / h); h = max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(rawImg, 0, 0, w, h);
          pendingPhoto = canvas.toDataURL('image/jpeg', 0.65);
          var preview = document.getElementById('photo-preview');
          preview.src = pendingPhoto;
          preview.classList.add('show');
          document.getElementById('preview-wrap').style.display = 'flex';
        };
        rawImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    function submitReg() {
      var first = document.getElementById('reg-first').value.trim();
      var last  = document.getElementById('reg-last').value.trim();
      var phone = document.getElementById('reg-phone').value.trim();
      if (!first || !last || !phone) { showModal('⚠️', 'שדות חסרים', 'יש למלא שם פרטי, שם משפחה וטלפון.', null); return; }
      db.collection('employees')
        .where('phone', '==', phone)
        .where('branch', '==', activeBranch)
        .get()
        .then(function(snap) {
          if (!snap.empty) {
            var existing = snap.docs[0].data();
            setSession(activeBranch, { empId: existing.id });
            if (existing.status === 'approved') { openEmployeeHome(existing); }
            else { showPendingModal(existing.firstName + ' ' + existing.lastName); }
            return;
          }
          var id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
          var emp = { id: id, firstName: first, lastName: last, phone: phone, photo: pendingPhoto || null, branch: activeBranch, status: 'pending', createdAt: new Date().toISOString() };
          db.collection('employees').doc(id).set(emp)
            .then(function() {
              setSession(activeBranch, { empId: id });
              showPendingModal(first + ' ' + last);
            })
            .catch(function() { showModal('⚠️', 'שגיאה', 'לא ניתן לשמור. בדקי חיבור לאינטרנט.', null); });
        })
        .catch(function() { showModal('⚠️', 'שגיאה', 'בעיית חיבור. נסי שוב.', null); });
    }

    function showPendingModal(fullName) {
      showModal('✉️', fullName + ' יקר/ה', 'בקשתך נשלחה למנהלת.\nלאחר אישור תוכל/י להיכנס לאפליקציה.', goHome);
    }

    function showGreeting(name, callback) {
      var overlay = document.getElementById('greet-overlay');
      var txt = document.getElementById('greet-text');
      txt.textContent = 'היי ' + name + '!';
      txt.classList.remove('run');
      void txt.offsetWidth;
      txt.classList.add('run');
      overlay.classList.add('active');
      setTimeout(function() {
        overlay.classList.remove('active');
        callback();
      }, 1800);
    }

    function openEmployeeHome(emp) {
      document.getElementById('emp-name-display').textContent   = 'שלום, ' + emp.firstName + '!';
      document.getElementById('emp-branch-display').textContent = '🏢 ' + BRANCH_NAME[emp.branch];
      renderEmployeeGrid();
      showGreeting(emp.firstName, function() { show('employee'); });
    }

    function logout() { goHome(); }

    /* ═══════════════════════════════════
       CONTENT RENDERING
    ═══════════════════════════════════ */
    function renderEmployeeGrid() {
      var c = getContent();
      var grid  = document.getElementById('emp-action-grid');
      var grid2 = document.getElementById('emp-action-grid-2');
      var bannerWrap = document.getElementById('emp-banner-wrap');
      grid.innerHTML = ''; grid2.innerHTML = '';
      ['btn1', 'btn2'].forEach(function(key) {
        var item = c[key];
        var el = document.createElement('button');
        el.className = 'action-btn';
        el.innerHTML = '<span class="a-icon">' + item.icon + '</span><span class="a-label">' + item.label + '</span>';
        (function(lbl){ el.onclick = function() { alert(lbl + ' — בקרוב'); }; })(item.label);
        grid.appendChild(el);
      });
      bannerWrap.innerHTML = '';
      var bEl = document.createElement('div');
      bEl.className = 'work-banner';
      (function(lbl){ bEl.onclick = function() { alert(lbl + ' — בקרוב'); }; })(c.banner.label);
      bEl.innerHTML = '<span class="banner-icon">' + c.banner.icon + '</span><span class="banner-label">' + c.banner.label + '</span>';
      bannerWrap.appendChild(bEl);
      ['btn3', 'btn4'].forEach(function(key) {
        var item = c[key];
        var el = document.createElement('button');
        el.className = 'action-btn';
        el.innerHTML = '<span class="a-icon">' + item.icon + '</span><span class="a-label">' + item.label + '</span>';
        (function(lbl){ el.onclick = function() { alert(lbl + ' — בקרוב'); }; })(item.label);
        grid2.appendChild(el);
      });
    }

    function renderManagerGrid() {
      var c = getContent();
      var grid  = document.getElementById('mgr-action-grid');
      var grid2 = document.getElementById('mgr-action-grid-2');
      var bannerWrap = document.getElementById('mgr-banner-wrap');
      grid.innerHTML = ''; grid2.innerHTML = '';
      ['btn1', 'btn2'].forEach(function(key) {
        var item = c[key];
        var el = document.createElement('div');
        el.className = 'action-btn';
        el.innerHTML =
          '<button class="mgr-edit-btn" onclick="openEditModal(\'' + key + '\');event.stopPropagation()">✏️</button>' +
          '<span class="a-icon">' + item.icon + '</span>' +
          '<span class="a-label">' + item.label + '</span>';
        grid.appendChild(el);
      });
      bannerWrap.innerHTML = '';
      var bEl = document.createElement('div');
      bEl.className = 'work-banner';
      bEl.innerHTML =
        '<span class="banner-icon">' + c.banner.icon + '</span>' +
        '<span class="banner-label">' + c.banner.label + '</span>' +
        '<button class="mgr-edit-btn" onclick="openEditModal(\'banner\');event.stopPropagation()">✏️</button>';
      bannerWrap.appendChild(bEl);
      ['btn3', 'btn4'].forEach(function(key) {
        var item = c[key];
        var el = document.createElement('div');
        el.className = 'action-btn';
        el.innerHTML =
          '<button class="mgr-edit-btn" onclick="openEditModal(\'' + key + '\');event.stopPropagation()">✏️</button>' +
          '<span class="a-icon">' + item.icon + '</span>' +
          '<span class="a-label">' + item.label + '</span>';
        grid2.appendChild(el);
      });
    }

    /* ═══════════════════════════════════
       EDIT MODAL
    ═══════════════════════════════════ */
    function openEditModal(key) {
      _editKey = key;
      var item = getContent()[key];
      var iconEl  = document.getElementById('edit-field-icon');
      var labelEl = document.getElementById('edit-field-label');
      iconEl.value  = item.icon;
      labelEl.value = item.label;
      document.getElementById('edit-preview-icon').textContent = item.icon;
      iconEl.oninput = function() {
        document.getElementById('edit-preview-icon').textContent = this.value || '✦';
      };
      document.getElementById('edit-modal-save').onclick = function() {
        var newIcon  = document.getElementById('edit-field-icon').value.trim()  || '✦';
        var newLabel = document.getElementById('edit-field-label').value.trim() || '—';
        var c = getContent();
        c[_editKey] = { icon: newIcon, label: newLabel };
        setContent(c);
        closeEditModal();
        renderManagerGrid();
      };
      document.getElementById('edit-modal').classList.add('open');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('open');
      _editKey = null;
    }

    /* ═══════════════════════════════════
       BADGE + PENDING DRAWER
    ═══════════════════════════════════ */
    function openPendingDrawer() {
      var body = document.getElementById('drawer-body');
      body.innerHTML = '<div class="drawer-empty">טוען...</div>';
      document.getElementById('pending-overlay').classList.add('open');
      document.getElementById('pending-drawer').classList.add('open');
      db.collection('employees').where('status', '==', 'pending').get()
        .then(function(snap) {
          body.innerHTML = '';
          if (snap.empty) { body.innerHTML = '<div class="drawer-empty">אין בקשות ממתינות 🎉</div>'; return; }
          snap.forEach(function(doc) {
            var emp = doc.data();
            var avatarHtml = emp.photo
              ? '<img src="' + emp.photo + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block" alt="">'
              : emp.firstName[0].toUpperCase();
            var card = document.createElement('div');
            card.className = 'req-card';
            card.id = 'req-' + emp.id;
            card.innerHTML =
              '<div class="emp-avatar">' + avatarHtml + '</div>' +
              '<div class="emp-info">' +
                '<div class="emp-fullname">' + emp.firstName + ' ' + emp.lastName + '</div>' +
                '<span class="req-branch-tag">' + BRANCH_NAME[emp.branch] + '</span>' +
                '<div class="emp-phone-txt">' + emp.phone + '</div>' +
              '</div>' +
              '<div class="emp-actions">' +
                '<button class="btn-approve" onclick="approveEmp(\'' + emp.id + '\',\'' + emp.branch + '\')">✓ אשר</button>' +
                '<button class="btn-reject"  onclick="rejectEmp(\'' + emp.id + '\',\'' + emp.branch + '\')">✕</button>' +
              '</div>';
            body.appendChild(card);
          });
        })
        .catch(function() { body.innerHTML = '<div class="drawer-empty">שגיאת חיבור. נסי שוב.</div>'; });
    }

    function closePendingDrawer() {
      document.getElementById('pending-overlay').classList.remove('open');
      document.getElementById('pending-drawer').classList.remove('open');
    }

    function approveEmp(id, branch) {
      db.collection('employees').doc(id).update({ status: 'approved' })
        .then(function() {
          var card = document.getElementById('req-' + id);
          if (card) card.remove();
          if (!document.querySelector('#drawer-body .req-card')) {
            document.getElementById('drawer-body').innerHTML = '<div class="drawer-empty">אין בקשות ממתינות 🎉</div>';
          }
        })
        .catch(function() { showModal('⚠️', 'שגיאה', 'לא ניתן לאשר. נסי שוב.', null); });
    }

    function rejectEmp(id, branch) {
      db.collection('employees').doc(id).delete()
        .then(function() {
          var card = document.getElementById('req-' + id);
          if (card) card.remove();
          if (!document.querySelector('#drawer-body .req-card')) {
            document.getElementById('drawer-body').innerHTML = '<div class="drawer-empty">אין בקשות ממתינות 🎉</div>';
          }
        })
        .catch(function() { showModal('⚠️', 'שגיאה', 'לא ניתן למחוק. נסי שוב.', null); });
    }

    function showModal(icon, heading, text, onOk) {
      document.getElementById('modal-icon').textContent    = icon;
      document.getElementById('modal-heading').textContent = heading;
      document.querySelector('.modal-body-text').textContent = text;
      modalCallback = onOk;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      if (modalCallback) { var cb = modalCallback; modalCallback = null; cb(); }
    }

    /* AUTO-LOGIN */
    (function() {
      var branches = ['raanana', 'hadera'];
      var i = 0;
      var lastScreen = localStorage.getItem('bbwor_screen');
      function tryBranch() {
        if (i >= branches.length) {
          if (lastScreen === 'manager') { enterManager(); }
          return;
        }
        var b = branches[i++];
        var session = getSession(b);
        if (!session) { tryBranch(); return; }
        db.collection('employees').doc(session.empId).get()
          .then(function(doc) {
            if (!doc.exists) { clearSession(b); tryBranch(); return; }
            var emp = doc.data();
            activeBranch = b;
            if (emp.status === 'approved') {
              if (lastScreen === 'manager') { enterManager(); }
              else { openEmployeeHome(emp); }
            } else {
              showPendingModal(emp.firstName + ' ' + emp.lastName);
            }
          })
          .catch(function() { tryBranch(); });
      }
      tryBranch();
    })();
  </script>
  <div id="greet-overlay"><div id="greet-text"></div></div>

  <div id="sync-bar">
    <span id="sync-dot"></span>
    <span id="sync-label">מתחבר...</span>
  </div>
</body>
</html>
